<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PerRobot — El juego de PerHost</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: none;
    }
    canvas { border: 2px solid #333; border-radius: 4px; max-width: 100vw; max-height: 100vh; }
    #ui {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      align-items: center;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }
    #score, #highscore {
      color: #e53935;
      font-size: clamp(14px, 4vw, 24px);
      font-weight: bold;
      text-shadow: 0 0 10px rgba(229,57,53,0.5);
      letter-spacing: 2px;
    }
    #gameOver {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 20;
    }
    #gameOver h1 {
      color: #e53935;
      font-size: clamp(28px, 8vw, 48px);
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(229,57,53,0.8);
    }
    #gameOver p {
      color: #888;
      font-size: clamp(14px, 3vw, 18px);
      margin-bottom: 20px;
    }
    #gameOver button {
      background: #e53935;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: clamp(14px, 3vw, 18px);
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
    }
    #gameOver button:hover { background: #c62828; }
    #instructions {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: clamp(10px, 2.5vw, 14px);
      text-align: center;
      width: 90%;
    }
    #touchZones {
      display: none;
      position: fixed;
      bottom: 8px;
      left: 8px;
      right: 8px;
      height: 44px;
      z-index: 5;
      gap: 8px;
    }
    .touch-zone {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
    }
    .touch-zone:active {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
    }
    #touchLeft { }
    #touchRight { }
    @media (max-width: 600px) {
      #touchZones { display: flex; }
      #instructions { bottom: 60px; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <span id="score">SCORE 00000</span>
    <span id="highscore">HI 00000</span>
  </div>
  <canvas id="game"></canvas>
  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p id="finalScore">Score: 0</p>
    <button onclick="restart()">REINICIAR</button>
  </div>
  <div id="touchZones">
    <div id="touchLeft" class="touch-zone">⬆ SALTAR</div>
    <div id="touchRight" class="touch-zone">⬇ AGACHARSE</div>
  </div>
  <div id="instructions">ESPACIO/CLICK = saltar | ↓ = agacharse</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('highscore');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');

    let W, H, ground, scaleX, scaleY;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('perrobot_hi') || '0');
    let speed = 4;
    let frame = 0;
    let gameOver = false;
    let jumpForce = 0;
    let gravity = 0.6;
    let isJumping = false;
    let isDucking = false;
    let legFrame = 0;

    let robot = { x: 80, y: 0, w: 24, h: 36, duckH: 22 };
    let obstacles = [];
    let buildings = [];
    let viruses = [];

    function resize() {
      const maxW = Math.min(window.innerWidth - 10, 800);
      const maxH = Math.min(window.innerHeight * 0.65, 300);
      W = maxW;
      H = maxH;
      canvas.width = W;
      canvas.height = H;
      ground = H - 40;
      robot.y = ground;
      scaleX = W / 800;
      scaleY = H / 300;
    }

    resize();
    window.addEventListener('resize', resize);

    function drawRobot() {
      const r = robot;
      const h = isDucking ? r.duckH : r.h;
      const y = isDucking ? ground + (r.h - r.duckH) : r.y;
      const s = Math.min(scaleX, scaleY);
      const sw = r.w * s;
      const sh = h * s;
      const sx = r.x * scaleX;
      const sy = y * scaleY;
      const sw2 = 24 * s;
      const sh2 = 36 * s;

      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(sx, sy, sw, sh);

      ctx.fillStyle = '#e53935';
      ctx.fillRect(sx + 4*s, sy + 6*s, sw - 8*s, sh - 12*s);

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(8, 11*s)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('P', sx + sw/2, sy + sh/2 + 4*s);

      ctx.fillStyle = '#e53935';
      ctx.fillRect(sx + 9*s, sy - 6*s, 5*s, 6*s);
      ctx.fillRect(sx + 8*s, sy - 9*s, 8*s, 3*s);

      ctx.fillStyle = '#0f0';
      ctx.fillRect(sx + 6*s, sy + 3*s, 4*s, 3*s);
      ctx.fillRect(sx + sw - 10*s, sy + 3*s, 4*s, 3*s);

      if (!isDucking) {
        ctx.fillStyle = '#333';
        legFrame = (legFrame + 0.15) % 4;
        const legOff = Math.sin(legFrame * Math.PI) * 3 * s;
        ctx.fillRect(sx + 4*s, sy + sh, 4*s, 6*s + legOff);
        ctx.fillRect(sx + sw - 8*s, sy + sh, 4*s, 6*s - legOff);
      }
    }

    function drawBuilding(b) {
      const s = Math.min(scaleX, scaleY);
      const bx = b.x * scaleX;
      const by = (ground + 50 - b.h) * scaleY;
      const bw = b.w * s;
      const bh = b.h * s;

      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(bx, by, bw, bh);

      ctx.fillStyle = b.lit ? '#ffd54f' : '#333';
      for (let wy = by + 4*s; wy < by + bh - 4*s; wy += 10*s) {
        for (let wx = bx + 3*s; wx < bx + bw - 3*s; wx += 8*s) {
          ctx.fillRect(wx, wy, 4*s, 5*s);
        }
      }

      ctx.fillStyle = '#555';
      ctx.fillRect(bx + bw/2 - 1, by - 8*s, 2, 8*s);
      ctx.fillStyle = '#e53935';
      ctx.fillRect(bx + bw/2 - 2, by - 10*s, 4, 3*s);
    }

    function drawVirus(v) {
      const s = Math.min(scaleX, scaleY);
      const cx = (v.x + 12) * scaleX;
      const cy = v.y * scaleY;
      const r = 10 * s;

      ctx.fillStyle = '#7b1fa2';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#7b1fa2';
      ctx.lineWidth = 2 * s;
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + frame * 0.05;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
        ctx.lineTo(cx + Math.cos(angle) * (r + 6*s), cy + Math.sin(angle) * (r + 6*s));
        ctx.stroke();
      }

      ctx.fillStyle = '#fff';
      ctx.fillRect(cx - 3*s, cy - 2*s, 2*s, 2*s);
      ctx.fillRect(cx + 1*s, cy - 2*s, 2*s, 2*s);

      ctx.strokeStyle = '#fff';
      ctx.lineWidth = s;
      ctx.beginPath();
      ctx.arc(cx, cy + 2*s, 3*s, 0, Math.PI);
      ctx.stroke();

      ctx.fillStyle = '#9c27b0';
      const wingY = Math.sin(frame * 0.2) * 3 * s;
      ctx.fillRect(cx - 15*s, cy - 3*s + wingY, 6*s, 2*s);
      ctx.fillRect(cx + 8*s, cy - 3*s - wingY, 6*s, 2*s);
    }

    function spawnObstacle() {
      const lastObs = buildings.length > 0 ? buildings[buildings.length - 1] : null;
      const minGap = 150 + (10 - speed) * 10;
      if (lastObs && (820 - lastObs.x) < minGap) return;

      if (Math.random() < (0.015 + speed * 0.001)) {
        const type = Math.random();
        if (type < 0.4) {
          const h = 30 + Math.random() * 40;
          buildings.push({ x: 820, h, w: 25 + Math.random() * 20, lit: Math.random() > 0.3 });
        } else if (type < 0.75) {
          buildings.push({ x: 820, h: 20 + Math.random() * 15, w: 20 + Math.random() * 15, lit: Math.random() > 0.3 });
        } else if (score > 600) {
          const virusChance = score > 3000 ? 0.15 : score > 1500 ? 0.1 : 0.08;
          if (Math.random() < virusChance) {
            viruses.push({ x: 820, y: ground - 15 - Math.random() * 35, w: 24, h: 20 });
          }
        }
      }
    }

    function checkCollision() {
      const r = robot;
      const h = isDucking ? r.duckH : r.h;
      const y = isDucking ? ground + (r.h - r.duckH) : r.y;
      const margin = 3;

      for (const b of buildings) {
        if (r.x + r.w - margin > b.x && r.x + margin < b.x + b.w &&
            y + h > ground + 50 - b.h && y < ground + 50) {
          return true;
        }
      }

      for (const v of viruses) {
        const dx = (r.x + r.w/2) - (v.x + 12);
        const dy = (y + h/2) - v.y;
        if (Math.sqrt(dx*dx + dy*dy) < 18) return true;
      }

      return false;
    }

    function drawGround() {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, (ground + 50) * scaleY);
      ctx.lineTo(W, (ground + 50) * scaleY);
      ctx.stroke();

      ctx.fillStyle = '#222';
      const offset = (frame * speed * scaleX) % (30 * scaleX);
      for (let i = -30 * scaleX; i < W + 30 * scaleX; i += 30 * scaleX) {
        ctx.fillRect(i - offset, (ground + 52) * scaleY, 20 * scaleX, 2);
      }
    }

    function drawStars() {
      ctx.fillStyle = '#333';
      for (let i = 0; i < 30; i++) {
        const x = (i * 137 + frame * 0.1) % W;
        const y = (i * 97) % (H * 0.5);
        ctx.fillRect(x, y, 1, 1);
      }
    }

    function update() {
      if (gameOver) return;
      frame++;
      score += Math.floor(speed / 3);

      if (score < 500) speed = 4;
      else if (score < 1000) speed = 5;
      else if (score < 2000) speed = 6;
      else if (score < 3500) speed = 7;
      else if (score < 5000) speed = 8;
      else if (score < 7000) speed = 9;
      else speed = 10;

      if (isJumping) {
        robot.y += jumpForce;
        jumpForce += gravity;
        if (robot.y >= ground) {
          robot.y = ground;
          isJumping = false;
          jumpForce = 0;
        }
      }

      buildings.forEach(b => b.x -= speed);
      viruses.forEach(v => { v.x -= speed; v.y += Math.sin(frame * 0.1) * 0.5; });

      buildings = buildings.filter(b => b.x + b.w > -50);
      viruses = viruses.filter(v => v.x > -30);

      spawnObstacle();

      if (checkCollision()) {
        gameOver = true;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('perrobot_hi', highScore);
        }
        finalScoreEl.textContent = `Score: ${score}`;
        gameOverEl.style.display = 'block';
      }

      scoreEl.textContent = `SCORE ${String(score).padStart(5, '0')}`;
      highEl.textContent = `HI ${String(highScore).padStart(5, '0')}`;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawStars();
      drawGround();
      drawRobot();
      buildings.forEach(drawBuilding);
      viruses.forEach(drawVirus);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function jump() {
      if (!isJumping && !gameOver) {
        isJumping = true;
        isDucking = false;
        jumpForce = -12 + Math.min(score / 1500, 4);
      }
    }

    function duck(start) {
      if (!isJumping && !gameOver) isDucking = start;
    }

    function restart() {
      score = 0;
      speed = 4;
      frame = 0;
      gameOver = false;
      robot.y = ground;
      isJumping = false;
      isDucking = false;
      buildings = [];
      viruses = [];
      gameOverEl.style.display = 'none';
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (gameOver) restart(); else jump(); }
      if (e.code === 'ArrowDown') duck(true);
    });
    document.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowDown') duck(false);
    });

    // Mouse
    canvas.addEventListener('click', () => { if (gameOver) restart(); else jump(); });

    // Touch zones
    const touchLeft = document.getElementById('touchLeft');
    const touchRight = document.getElementById('touchRight');

    touchLeft.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameOver) restart(); else jump(); });
    touchRight.addEventListener('touchstart', (e) => { e.preventDefault(); duck(true); });
    touchRight.addEventListener('touchend', (e) => { e.preventDefault(); duck(false); });

    // Full canvas touch fallback
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const x = e.touches[0].clientX;
      const rect = canvas.getBoundingClientRect();
      const relX = x - rect.left;
      if (gameOver) { restart(); return; }
      if (relX > rect.width / 2) { duck(true); } else { jump(); }
    });
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); duck(false); });

    highEl.textContent = `HI ${String(highScore).padStart(5, '0')}`;
    gameLoop();
  </script>
</body>
</html>
